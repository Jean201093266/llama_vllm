type: inference
model_name_or_path: Qwen/Qwen2-1.5B-Instruct
mode: batch
tensor_parallel_size: 1
pipeline_parallel_size: 1
gpu_memory_utilization: 0.9
dtype: auto
quantization: null
enable_lora: false
max_lora_rank: 64
input_file: ./examples/inference/prompts.jsonl
output_file: ./outputs/inference/results.jsonl
batch_size: 16
prompt_key: prompt

sampling:
  temperature: 0.7
  top_p: 0.9
  top_k: -1
  max_tokens: 256
  stop: []
  presence_penalty: 0.0
  frequency_penalty: 0.0
  repetition_penalty: 1.0
  best_of: 1
  use_beam_search: false

server:
  host: 0.0.0.0
  port: 8000
  workers: 1
  api_key: null

