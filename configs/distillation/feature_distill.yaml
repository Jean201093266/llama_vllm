type: distillation
teacher_model: Qwen/Qwen2-7B-Instruct
student_model: Qwen/Qwen2-1.5B-Instruct
distill_type: combined
temperature: 2.0
alpha: 0.6
feature_layers: [8, 16, 24]
feature_loss_type: mse
project_hidden: true
use_vllm_teacher: false
teacher_tensor_parallel_size: 1
teacher_dtype: bfloat16
use_lora_student: false

data:
  dataset_name_or_path: data/sharegpt_demo.jsonl
  dataset_format: sharegpt
  train_split: train
  eval_split: validation
  max_seq_length: 2048
  preprocessing_num_workers: 1

training:
  run_name: distill-feature-demo
  learning_rate: 1.0e-4
  num_train_epochs: 2
  max_steps: -1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  weight_decay: 0.01
  bf16: true
  fp16: false
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  auto_resume_from_last_checkpoint: true
  early_stopping_patience: null
  early_stopping_threshold: 0.0
  save_safetensors: true
  logging_first_step: true
  optim: adamw_torch
  ddp_find_unused_parameters: false
  report_to: [tensorboard]

output_dir: ./outputs/distillation/feature

